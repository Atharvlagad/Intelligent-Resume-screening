<!DOCTYPE html>
<html>

<head>

<title>AI Resume Screening System</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
width:850px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.drop-zone{
border:2px dashed #2563eb;
padding:40px;
text-align:center;
border-radius:10px;
margin-bottom:20px;
cursor:pointer;
background:#f9fafb;
font-size:16px;
}

.drop-zone.dragover{
background:#e0ecff;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
margin-top:10px;
width:100%;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.spinner{
border:3px solid #f3f3f3;
border-top:3px solid white;
border-radius:50%;
width:14px;
height:14px;
animation:spin 1s linear infinite;
display:inline-block;
margin-left:8px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress{
height:10px;
background:#e5e7eb;
margin-top:15px;
border-radius:5px;
display:none;
}

.progress-bar{
height:10px;
background:#2563eb;
width:0%;
border-radius:5px;
transition:width 0.5s;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Resume Screening System</h2>

<div class="drop-zone" id="dropZone">
Drag & Drop ZIP file here or Click to Upload
</div>

<input type="file" id="zipFile" accept=".zip" style="display:none">

<textarea id="jd" placeholder="Paste job description here"></textarea>

<input type="number" id="scoreFilter" placeholder="Enter minimum score (example: 60)">

<button id="rankBtn" onclick="rank()">Rank Candidates</button>

<button id="excelBtn" onclick="downloadExcel()">Download Excel</button>

<div class="progress" id="progressBox">
<div class="progress-bar" id="progressBar"></div>
</div>

<table id="resultTable" style="display:none">

<thead>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Experience</th>
<th>Skill Score</th>
<th>AI Match</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

let dropZone = document.getElementById("dropZone");
let fileInput = document.getElementById("zipFile");


dropZone.addEventListener("click", () => fileInput.click());


dropZone.addEventListener("dragover", (e) => {

e.preventDefault();
dropZone.classList.add("dragover");

});


dropZone.addEventListener("dragleave", () => {

dropZone.classList.remove("dragover");

});


dropZone.addEventListener("drop", (e) => {

e.preventDefault();
dropZone.classList.remove("dragover");

let files = e.dataTransfer.files;

if(files.length === 0){
return;
}

if(!files[0].name.endsWith(".zip")){
alert("Please upload a ZIP file");
return;
}

fileInput.files = files;

dropZone.innerHTML = "Uploaded: " + files[0].name;

});


fileInput.addEventListener("change", () => {

if(fileInput.files.length > 0){
dropZone.innerHTML = "Uploaded: " + fileInput.files[0].name;
}

});


function startProgress(){

let bar=document.getElementById("progressBar");
let box=document.getElementById("progressBox");

box.style.display="block";

let width=10;

let interval=setInterval(()=>{

width+=10;

bar.style.width=width+"%";

if(width>=90){
clearInterval(interval);
}

},500);

}


function stopProgress(){

document.getElementById("progressBar").style.width="100%";

setTimeout(()=>{
document.getElementById("progressBox").style.display="none";
document.getElementById("progressBar").style.width="0%";
},1000);

}


async function rank(){

let zip=fileInput.files[0];
let jd=document.getElementById("jd").value;
let score=document.getElementById("scoreFilter").value;

if(!zip){
alert("Please upload ZIP file");
return;
}

let rankBtn=document.getElementById("rankBtn");

rankBtn.disabled=true;
rankBtn.innerHTML="Processing <span class='spinner'></span>";

startProgress();

let formData=new FormData();

formData.append("zip_file",zip);
formData.append("job_description",jd);
formData.append("min_score",score);

let response=await fetch("/rank-resumes",{
method:"POST",
body:formData
});

let data=await response.json();

stopProgress();

rankBtn.disabled=false;
rankBtn.innerHTML="Rank Candidates";

let table=document.getElementById("resultTable");
let tbody=table.querySelector("tbody");

tbody.innerHTML="";

data.forEach(c=>{

let row=`
<tr>
<td>${c.Rank}</td>
<td>${c.Name}</td>
<td>${c.Email}</td>
<td>${c.Phone}</td>
<td>${c.Experience}</td>
<td>${c["Skill Score"]}</td>
<td>${c["AI Match"]}</td>
</tr>
`;

tbody.innerHTML+=row;

});

table.style.display="table";

}


async function downloadExcel(){

let zip=fileInput.files[0];
let jd=document.getElementById("jd").value;
let score=document.getElementById("scoreFilter").value;

if(!zip){
alert("Please upload ZIP file");
return;
}

let btn=document.getElementById("excelBtn");

btn.disabled=true;
btn.innerHTML="Downloading <span class='spinner'></span>";

startProgress();

let formData=new FormData();

formData.append("zip_file",zip);
formData.append("job_description",jd);
formData.append("min_score",score);

let response=await fetch("/rank-resumes/download",{
method:"POST",
body:formData
});

let blob=await response.blob();

stopProgress();

btn.disabled=false;
btn.innerHTML="Download Excel";

let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="ranked_resumes.xlsx";
a.click();

}

</script>

</body>
</html>
